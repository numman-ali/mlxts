name: Pack Dry Run

on:
  pull_request:
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package dist output
        run: bun run build

      - name: Dry-run public package tarballs
        run: bun run pack:dry-run
